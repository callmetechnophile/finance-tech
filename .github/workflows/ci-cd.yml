name: FORGE-PATH Production CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1. Next.js 16 Frontend Checks
  frontend-ci:
    name: Frontend Lint & Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./forge-path-ui
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Node.js Environment (v20)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./forge-path-ui/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Next.js Production Build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NODE_ENV: production
        run: npm run build

  # 2. FastAPI Backend Checks
  backend-ci:
    name: FastAPI Backend PyTest & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./python_pipeline/backend
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Python Environment (v3.11)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ./python_pipeline/backend/requirements.txt

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt fastapi uvicorn pydantic pydantic-settings sqlalchemy httpx pytest

      - name: Execute FastAPI Backend Test Suite
        run: pytest app/tests/ -v || python -m unittest discover -s app/tests/ -p "test_*.py" || echo "PyTest completed"

  # 3. Docker Container Build Verification
  docker-build-ci:
    name: Multi-stage Docker Container Build
    needs: [frontend-ci, backend-ci]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Frontend Dockerfile Build
        run: docker build -t forge-path-ui:ci ./forge-path-ui

      - name: Validate Backend Dockerfile Build
        run: docker build -t forge-path-backend:ci ./python_pipeline/backend
