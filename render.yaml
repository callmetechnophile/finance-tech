services:
  - type: web
    name: forge-path-backend
    env: python
    buildCommand: pip install -r python_pipeline/requirements.txt
    startCommand: cd python_pipeline/backend && PYTHONPATH=. gunicorn app.main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        sync: false # User will set this in the Render dashboard
      - key: NVIDIA_API_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
