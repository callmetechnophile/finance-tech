services:
  - type: web
    name: forge-path-data-engine
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: DATABASE_URL
        sync: false # User will set this in the Render dashboard
      - key: NVIDIA_API_KEY
        sync: false
      - key: PUTER_API_KEY
        sync: false
