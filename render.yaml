services:
  # FastAPI Backend Service on Render
  - type: web
    name: forge-path-api
    env: python
    region: ohio
    rootDir: python_pipeline/backend
    buildCommand: pip install -r requirements.txt fastapi uvicorn pydantic pydantic-settings sqlalchemy psycopg2-binary
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: API_V1_STR
        value: /api/v1
      - key: DATABASE_URL
        fromDatabase:
          name: forge-path-db
          property: connectionString

databases:
  # Managed PostgreSQL Database on Render
  - name: forge-path-db
    databaseName: forge_path_db
    user: postgres
    region: ohio
